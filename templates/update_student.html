<!DOCTYPE html>
<html>

<head>
    <title>Update Student</title>
</head>

<body>

    <h1>Update Student</h1>

    <form method="POST">

        <input type="text"
               name="name"
               value="{{ student.name }}"
               required>

        <br><br>

        <input type="text"
               name="age"
               value="{{ student.age }}"
               required>

        <br><br>

        <input type="text"
               name="course"
               value="{{ student.course }}"
               required>

        <br><br>

        <button type="submit">
            Update Student
        </button>

    </form>

</body>

</html>
