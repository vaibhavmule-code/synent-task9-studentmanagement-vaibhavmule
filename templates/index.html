<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Management System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
            padding:40px;
        }

        .container{
            max-width:1100px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        h1{
            margin-bottom:20px;
            color:#333;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .btn{
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:10px 16px;
            border-radius:5px;
        }

        .btn:hover{
            background:#0056b3;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table th{
            background:#007bff;
            color:white;
        }

        table th,
        table td{
            padding:12px;
            border:1px solid #ddd;
            text-align:center;
        }

        tr:nth-child(even){
            background:#f9f9f9;
        }

        .edit-btn{
            background:#28a745;
            color:white;
            padding:6px 12px;
            border-radius:4px;
            text-decoration:none;
            margin-right:5px;
        }

        .delete-btn{
            background:#dc3545;
            color:white;
            padding:6px 12px;
            border-radius:4px;
            text-decoration:none;
        }

        .edit-btn:hover{
            background:#1e7e34;
        }

        .delete-btn:hover{
            background:#bd2130;
        }

        .empty{
            text-align:center;
            padding:20px;
            color:gray;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="top-bar">

            <h1>Student Management System</h1>

            <a href="/add" class="btn">
                Add Student
            </a>

        </div>

        <table>

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>Actions</th>

            </tr>

            {% if students %}

                {% for student in students %}

                <tr>

                    <td>{{ student.id }}</td>
                    <td>{{ student.name }}</td>
                    <td>{{ student.age }}</td>
                    <td>{{ student.course }}</td>

                    <td>

                        <a href="/update/{{ student.id }}"
                           class="edit-btn">

                           Edit

                        </a>

                        <a href="/delete/{{ student.id }}"
                           class="delete-btn">

                           Delete

                        </a>

                    </td>

                </tr>

                {% endfor %}

            {% else %}

                <tr>

                    <td colspan="5" class="empty">

                        No student records found

                    </td>

                </tr>

            {% endif %}

        </table>

    </div>

</body>

</html>
